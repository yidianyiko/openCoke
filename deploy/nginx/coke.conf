server {
    listen 80;
    server_name coke.keep4oforever.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name coke.keep4oforever.com;

    ssl_certificate /etc/nginx/ssl/coke/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/coke/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 20m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;

    location = /bridge {
        proxy_pass http://127.0.0.1:4041/bridge;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ^~ /bridge/ {
        proxy_pass http://127.0.0.1:8090;
    }

    location ^~ /user/ {
        proxy_pass http://127.0.0.1:8090;
    }

    location ^~ /bind/ {
        proxy_pass http://127.0.0.1:8090;
    }

    location = /auth {
        proxy_pass http://127.0.0.1:4041/auth;
    }

    location = /health {
        proxy_pass http://127.0.0.1:4041/health;
    }

    location = /gateway {
        proxy_pass http://127.0.0.1:4041/gateway;
    }

    location ^~ /gateway/ {
        proxy_pass http://127.0.0.1:4041;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:4041;
    }

    location / {
        proxy_pass http://127.0.0.1:4040;
    }
}
